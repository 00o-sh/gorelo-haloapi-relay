name: Gorelo swagger drift

# Nightly poll of the live Gorelo OpenAPI spec. When it no longer matches the
# committed snapshot (docs/gorelo-swagger.v1.json), open (or refresh) a PR that
# updates the snapshot, with a summary of what changed. The relay hand-writes its
# Gorelo types from this spec, so a drift PR is the prompt to re-check src/types.ts
# and the mock. Runs on a schedule and on demand.

on:
  schedule:
    # 05:12 UTC daily — an off-peak, non-round minute so it isn't lost in the
    # top-of-hour scheduling crush GitHub warns about.
    - cron: "12 5 * * *"
  workflow_dispatch:

# Least privilege: update the snapshot branch and open/refresh its PR.
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: gorelo-swagger-drift
  cancel-in-progress: false

jobs:
  drift:
    name: Check live spec for drift
    runs-on: ubuntu-latest
    env:
      BRANCH: automation/gorelo-swagger-sync
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7

      - name: Sync snapshot from the live spec
        id: sync
        run: |
          set -euo pipefail
          # Rewrites docs/gorelo-swagger.v1.json in place and prints a change
          # summary (comparing the committed snapshot to the live spec).
          python3 scripts/sync-gorelo-swagger.py --summary | tee /tmp/drift-summary.md
          if git diff --quiet -- docs/gorelo-swagger.v1.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No drift; nothing to do."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or refresh the snapshot PR
        if: steps.sync.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH"
          git add docs/gorelo-swagger.v1.json
          git commit -m "chore: sync Gorelo swagger snapshot from live spec"
          git push --force-with-lease origin "$BRANCH"

          # Build the PR body from the drift summary.
          {
            echo "Automated update of the committed Gorelo OpenAPI snapshot"
            echo "([\`docs/gorelo-swagger.v1.json\`](docs/gorelo-swagger.v1.json)) to match the live spec at"
            echo "https://api.usw.gorelo.io/swagger/v1/swagger.json."
            echo
            echo "## What changed"
            echo
            cat /tmp/drift-summary.md
            echo
            echo "The relay hand-writes its Gorelo types (\`src/types.ts\`) from this spec, so please"
            echo "re-check those types and the mock responses against the diff before merging."
            echo
            echo "---"
            echo "_Generated by [Claude Code](https://claude.ai/code)_"
          } > /tmp/pr-body.md

          existing="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' || true)"
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --body-file /tmp/pr-body.md
            echo "Refreshed existing PR #$existing"
          else
            gh pr create \
              --head "$BRANCH" \
              --base main \
              --title "chore: sync Gorelo swagger snapshot from live spec" \
              --body-file /tmp/pr-body.md
          fi
